name: Cascading Merge

on:
  workflow_dispatch: 
  pull_request:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  debug:
    name: Debug Pull Request Context
    runs-on: ubuntu-latest
    steps:
      - name: Print GitHub context
        run: |
          echo "github.base_ref=${{ github.base_ref }}"
          echo "github.head_ref=${{ github.head_ref }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.event.pull_request.base.ref=${{ github.event.pull_request.base.ref }}"
          echo "github.event.pull_request.head.ref=${{ github.event.pull_request.head.ref }}"
          echo "github.event.pull_request.merged=${{ github.event.pull_request.merged }}"

  merge:
    name: Cascading Auto Merge
    runs-on: ubuntu-latest
    needs: debug
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.base_ref, 'release/')
      
    steps:
      # When a pull request is merged into a release branch
      # (for example: feature/foo -> release/1.2),
      # the ActionsDesk cascading merge action automatically
      # propagates that change to the next downstream release
      # branches and eventually to the development branch.
      #
      # Example branch flow:
      #   release/1.0 -> release/1.1 -> release/1.2 -> development
      #
      # If a PR is merged into release/1.0, this action will attempt:
      #   1. Merge release/1.0 into release/1.1
      #   2. Merge release/1.1 into release/1.2
      #   3. Merge release/1.2 into development
      #
      # The workflow only runs when:
      #   - the PR was merged successfully, and
      #   - the target branch (base_ref) starts with "release/"
      #
      # The action uses semantic version ordering to determine
      # downstream release branches. If a merge conflict occurs,
      # the cascade stops and a pull request may be created for
      # manual resolution.
      - name: Automatic Merge
        uses: jefeish/cascading-downstream-merge@jefeish/jira_id-support
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
    
          # Release branch prefix used to identify and order
          # release branches participating in the cascade.
          prefixes: release/
    
          # Final branch in the merge chain.
          # After all newer release branches have been updated,
          # changes are merged into this branch.
          ref_branch: development
